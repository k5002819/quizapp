<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>協同準則學習系統 V4 單機版</title>
<style>
:root{--bg:#0b1220;--card:#121b2e;--card2:#18243a;--text:#eef5ff;--muted:#9fb0c9;--brand:#58d68d;--warn:#ffd166;--bad:#ff6b6b;--extra:#4dabf7;--ok:#69db7c;--line:#2b3954}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(160deg,#08111f,#0e1a2e 45%,#13213a);font-family:-apple-system,BlinkMacSystemFont,'Microsoft JhengHei',Arial,sans-serif;color:var(--text);padding-bottom:90px}
header{position:sticky;top:0;z-index:10;background:rgba(8,17,31,.92);backdrop-filter:blur(12px);padding:14px 16px;border-bottom:1px solid var(--line)}
h1{font-size:20px;margin:0}.sub{font-size:12px;color:var(--muted);margin-top:4px}main{max-width:1000px;margin:0 auto;padding:16px}.card{background:rgba(18,27,46,.96);border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}button,select,input,textarea{font-family:inherit}button,.btn{border:0;border-radius:12px;padding:12px 14px;background:#2b7cff;color:white;font-weight:700;cursor:pointer}button.secondary{background:#263650;color:#dbe7ff}button.good{background:#18864b}button.warn{background:#b7791f}button.bad{background:#b83636}button:disabled{opacity:.45}select,input,textarea{width:100%;border:1px solid var(--line);background:#0d1728;color:var(--text);border-radius:12px;padding:12px;font-size:16px}textarea{min-height:150px;resize:vertical;line-height:1.6}.hidden{display:none!important}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:var(--card2);border-radius:14px;padding:12px;text-align:center}.stat b{font-size:22px;display:block}.muted{color:var(--muted)}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;position:fixed;bottom:0;left:0;right:0;background:rgba(8,17,31,.95);padding:8px max(8px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom));border-top:1px solid var(--line);z-index:20}.tabs button{font-size:12px;padding:10px 4px;background:#1e2b42}.tabs button.active{background:#2b7cff}.qtitle{font-size:20px;line-height:1.5;margin:6px 0 10px}.badge{display:inline-block;padding:4px 8px;border-radius:99px;background:#24334e;color:#cfe0ff;font-size:12px;margin:2px}.resultbox{line-height:2.0;font-size:17px;word-break:break-word;background:#0b1425;border-radius:12px;padding:12px;margin-top:10px}.ok{background:rgba(105,219,124,.18);color:#b8ffc5;border-bottom:2px solid var(--ok)}.miss{background:rgba(255,209,102,.22);color:#ffe29c;border-bottom:2px solid var(--warn)}.wrong{background:rgba(255,107,107,.22);color:#ffb4b4;border-bottom:2px solid var(--bad)}.extra{background:rgba(77,171,247,.22);color:#b9ddff;border-bottom:2px solid var(--extra)}.report{white-space:pre-wrap;line-height:1.8}.listitem{padding:12px;border:1px solid var(--line);border-radius:12px;margin:8px 0;background:#0e182a}.small{font-size:13px}.progress{height:12px;background:#0b1425;border-radius:99px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,#2b7cff,#58d68d)}
@media(max-width:560px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr 1fr}}
</style></head>
<body><header><h1>🎖 協同準則學習系統 V4 單機版</h1><div class="sub">題庫內建，不再依賴 questions.json；適合 GitHub Pages 與 iPhone 主畫面</div></header>
<main>
<section id="home" class="page"><div class="card"><h2>學習儀表板</h2><div class="stats"><div class="stat"><b id="sTotal">0</b><span>累積作答</span></div><div class="stat"><b id="sAvg">0</b><span>平均分</span></div><div class="stat"><b id="sWrong">0</b><span>錯題數</span></div><div class="stat"><b id="sStreak">0</b><span>連續天數</span></div></div><p class="muted">資料只保存在本機瀏覽器，不上傳雲端。</p></div><div class="card"><h2>快速開始</h2><div class="grid"><button onclick="showPage('practice')">一般練習</button><button onclick="showPage('exam')">模擬考</button><button onclick="showPage('wrong')">錯題庫</button><button onclick="showPage('stats')">學習統計</button></div></div></section>
<section id="practice" class="page hidden"><div class="card"><h2>一般練習</h2><select id="practiceMode"><option value="army1">陸綱 1-20 循序</option><option value="army2">陸綱 21-40 循序</option><option value="staff1">指參 1-20 循序</option><option value="staff2">指參 21-40 循序</option><option value="intel">情報 1-10 循序</option><option value="cab">聯兵營 1-10 循序</option><option value="mix20">混合 20 題：各科前半與1-10</option><option value="mix40">全題庫隨機 40 題</option></select><div style="margin-top:10px"><button onclick="startPractice()">開始練習</button></div></div><div id="quizCard" class="card hidden"><div><span id="qBadge" class="badge"></span><span id="qProgress" class="badge"></span></div><div id="qText" class="qtitle"></div><textarea id="answerInput" placeholder="請輸入答案，按「提交批改」會標示錯字、漏字與多字"></textarea><div style="margin-top:10px" class="grid"><button class="good" onclick="gradeCurrent()">提交批改</button><button class="secondary" onclick="showReference()">顯示標準答案</button><button class="secondary" onclick="nextQuestion()">下一題</button><button class="warn" onclick="favCurrent()">收藏</button></div><div id="scoreLine" class="card hidden"></div><div id="diffResult" class="resultbox hidden"></div><div id="refAnswer" class="card hidden"></div></div></section>
<section id="exam" class="page hidden"><div class="card"><h2>三階段模擬考</h2><div class="grid"><button onclick="startExam(1)">第一階段 20題 / 95合格</button><button onclick="startExam(2)">第二階段 100題 / 97合格</button><button onclick="startExam(3)">第三階段 100題 / 99合格</button></div><p class="muted">每題以 100 分起算，每錯、漏、多 1 字扣 0.5 分，總分取平均。</p></div><div id="examReport" class="card hidden"></div></section>
<section id="wrong" class="page hidden"><div class="card"><h2>錯題庫</h2><div class="grid"><button onclick="renderWrong()">重新整理</button><button class="bad" onclick="clearWrong()">清空錯題</button><button onclick="practiceWrong()">練習錯題</button></div><div id="wrongList"></div></div></section>
<section id="stats" class="page hidden"><div class="card"><h2>學習統計</h2><div id="statsBox"></div></div></section>
</main><nav class="tabs"><button onclick="showPage('home')" id="tab-home">首頁</button><button onclick="showPage('practice')" id="tab-practice">練習</button><button onclick="showPage('exam')" id="tab-exam">模擬考</button><button onclick="showPage('wrong')" id="tab-wrong">錯題</button></nav>
<script>
const QUESTIONS = [{"id": 1, "cat": "陸綱", "no": 1, "q": "現代戰場用兵，應置重點於何處?", "a": "戰場用兵，應置重點於打擊敵指管系統，破壞聯合作戰關鍵結構，摧毀敵作戰重心，繼以殲滅敵人有生力量。", "source": "陸軍作戰要綱(115年)(115年)，第一篇第一章第101004條P 1-1-1"}, {"id": 2, "cat": "陸綱", "no": 2, "q": "戰爭型態發展為何?", "a": "戰爭已朝非接觸、非對稱、非線性型態發展，主要體現在 「多領域作戰」、「混合式作戰」等多樣化戰爭型態模式。", "source": "陸軍作戰要綱(115年)(115年)，第一篇第一章第101005條P 1-1-1"}, {"id": 3, "cat": "陸綱", "no": 3, "q": "聯合作戰之意義", "a": "統合運用兩個（含）以上不同軍種或不同領域之作戰單位陸上、水面（下）、空中、電磁、網路、太空等在明確的指揮管制關係下，執行共同任務，為達成同一作戰目的，所遂行之作戰，不論其階層與指揮關係如何，均謂之聯合作戰。", "source": "陸軍作戰要綱(115年)(115年)，第一篇第三章第103001條P 1-3-10"}, {"id": 4, "cat": "陸綱", "no": 4, "q": "兵種協同作戰成功基礎", "a": "統一指揮、充分協調與合作、即時有效指揮管制，為遂行協 同作戰成功的基礎與必備條件。", "source": "陸軍作戰要綱(115年)(115年)，第一篇第三章第103042條P 1-3-19"}, {"id": 5, "cat": "陸綱", "no": 5, "q": "勤務支援一般原則為何?", "a": "1、後勤為先。 2、先期整備。 3、運輸安全。 4、決心須以勤務能力為基礎。", "source": "陸軍作戰要綱(115年)(115年)，第一篇第四章第104004條P 1-4-20"}, {"id": 6, "cat": "陸綱", "no": 6, "q": "政治作戰特性為何?", "a": "1、以人為中心。 2、以智慧取勝。 3、無時空限制。 4、重視戰場經營。", "source": "陸軍作戰要綱(115年)(115年)，第一篇第六章第106002條P 1-6-44"}, {"id": 7, "cat": "陸綱", "no": 7, "q": "軍事動員區分為何?", "a": "1、軍隊動員。 2、軍需工業動員。", "source": "陸軍作戰要綱(115年)(115年)，第一篇第七章第107006條P 1-7-50"}, {"id": 8, "cat": "陸綱", "no": 8, "q": "計畫動員種類有哪些?", "a": "1、部隊動員。 2、輔助軍事勤務人力動員。", "source": "陸軍作戰要綱(115年)(115年)，第一篇第七章第107007條P 1-7-50"}, {"id": 9, "cat": "陸綱", "no": 9, "q": "防衛編組意義為何?", "a": "旨在因應防衛作戰需要，分別賦予作戰任務及責任地區，以 統合地區內各部隊戰力，達成作戰目的。", "source": "陸軍作戰要綱(115年)(115年)，第二篇第三章第203015條P 2-3-60"}, {"id": 10, "cat": "陸綱", "no": 10, "q": "指揮之意義為何?", "a": "依法授予某個人以掌握與運用軍隊之職責，該個人將其意志變成所屬部隊之行動。", "source": "陸軍作戰要綱(115年)，第二篇第四章第204001條P 2-4-63"}, {"id": 11, "cat": "陸綱", "no": 11, "q": "指揮關係之區分?", "a": "1、建制。 2、編配。 3、配屬。 4、作戰管制。", "source": "陸軍作戰要綱(115年)，第二篇第四章第204003條P 2-4-63"}, {"id": 12, "cat": "陸綱", "no": 12, "q": "指揮所之區分為?", "a": "1、主指揮所。 2、後方指揮所。 3、機動指揮所。 4、預備指揮所。", "source": "陸軍作戰要綱(115年)，第二篇第四章第204006條P 2-4-64"}, {"id": 13, "cat": "陸綱", "no": 13, "q": "指揮所位置選定考量因素為何?", "a": "1、便於指揮掌握，並適應戰況之推移。 2、與上下級及友軍連絡容易。 3、進出、變換容易，且有足夠之疏散空間。 4、有利於警戒、隱（掩）蔽、防空及化生放核防護措施。 5、各種通信、資訊設施建立容易。", "source": "陸軍作戰要綱(115年)，第二篇第四章第204007條P 2-4-64"}, {"id": 14, "cat": "陸綱", "no": 14, "q": "指揮掌握之必要手段?", "a": "1、命令。 2、通報。 3、報告。", "source": "陸軍作戰要綱(115年)，第二篇第四章第204009條P 2-4-65"}, {"id": 15, "cat": "陸綱", "no": 15, "q": "何謂決心?", "a": "乃由指揮官與參謀依狀況判斷而產生之結論，須由指揮官親自為之，為發展作戰構想之基礎，各級幹部應以堅強之意志貫徹。", "source": "陸軍作戰要綱(115年)，第二篇第四章第204020條P 2-4-67"}, {"id": 16, "cat": "陸綱", "no": 16, "q": "部隊掌握之基礎為何?", "a": "1、統一戰術思想。 2、示以明確作戰構想。 3、賦予明確任務與作戰企圖。 4、周密靈活通資連絡。 5、下級指揮官適切之獨斷專行。", "source": "陸軍作戰要綱(115年)，第二篇第四章第204028條P 2-4-69"}, {"id": 17, "cat": "陸綱", "no": 17, "q": "影響戰局之手段為何?", "a": "1、適時將火力重點指向所望地區。 2、適切使用預備隊。 3、彈性調整部署。 4、靈活轉移兵力，促進作戰進展。", "source": "陸軍作戰要綱(115年)，第二篇第四章第204036條P 2-4-70"}, {"id": 18, "cat": "陸綱", "no": 18, "q": "聯合作戰管制之範圍為何?", "a": "1、戰術行動。 2、火力運用。 3、後勤支援。 4、政治作戰。 5、其他足以危害安全之非軍事行動。", "source": "陸軍作戰要綱(115年)，第二篇第五章第205006條P 2-5-71"}, {"id": 19, "cat": "陸綱", "no": 19, "q": "聯合作戰管制方式為何?", "a": "1、計畫管制。 2、臨機管制。", "source": "陸軍作戰要綱(115年)，第二篇第五章第205008條P 2-5-72"}, {"id": 20, "cat": "陸綱", "no": 20, "q": "聯合作戰管制指導為何?", "a": "1、確保聯合作戰各部隊作戰計畫、戰術行動及火力運用等，在時空因素上能配合一致、不相牴觸。 2、明確律定部隊行動時間管制表，並督導確實 執行。 3、訂定適切之辨別、辨識規定及相互間之通報管道。 4、互派連絡官。", "source": "陸軍作戰要綱(115年)，第二篇第五章第205009條P 2-5-72"}, {"id": 21, "cat": "陸綱", "no": 21, "q": "空地作戰管制一般原則為何?", "a": "1、區分主從、分層負責。 2、周密協調、確實管制。", "source": "陸軍作戰要綱(115年)，第二篇第五章第205015條P 2-5-73"}, {"id": 22, "cat": "陸綱", "no": 22, "q": "何謂交戰規則?", "a": "交戰規則係於承平、作戰期間之法律規範，用以提供各級指揮官管理軍事行動上之運用，並藉各式任務使全體軍官、士、兵理解交戰規則概念，在共通性理解基礎上，擬定作戰計畫，執行軍事行動，俾確立部隊使用武力之合法性與正當性。", "source": "陸軍作戰要綱(115年)，第二篇第五章205004條P 2-5-71"}, {"id": 23, "cat": "陸綱", "no": 23, "q": "地面火力管制安全措施?", "a": "禁射線、火力支援協調線、自由射擊區、限制射擊線、火力協調區、禁射區、協調射擊線。", "source": "陸軍作戰要綱(115年)，第二篇第五章第205033條P 2-5-78"}, {"id": 24, "cat": "陸綱", "no": 24, "q": "地面作戰管制方式為何?", "a": "1、計畫管制。 2、臨機管制。 3、協調後管制。", "source": "陸軍作戰要綱(115年)，第二篇第五章第205031條P 2-5-78"}, {"id": 25, "cat": "陸綱", "no": 25, "q": "何謂臨機管制?", "a": "對新發現徵候，足以影響戰局或危害部隊安全者，應即修（增）訂計畫，並實施必要管制。", "source": "陸軍作戰要綱(115年)，第二篇第五章第205031條P 2-5-78"}, {"id": 26, "cat": "陸綱", "no": 26, "q": "何謂計畫管制", "a": "依據作戰計畫中各階段行動，對所管制部隊兵力之運用、時間因素配合及所望戰果，實施嚴密管制。", "source": "陸軍作戰要綱(115年)，第二篇第五章第205031條P 2-5-78"}, {"id": 27, "cat": "陸綱", "no": 27, "q": "空域管制安全措施為何?", "a": "1、限制射擊空域。 2、限航區。 3、空中安全走廊。", "source": "陸軍作戰要綱(115年)，第二篇第五章第205034條P 2-5-79"}, {"id": 28, "cat": "陸綱", "no": 28, "q": "掌握主動之具體作為為何?", "a": "1、迅確的情報。 2、適切的判斷。 3、優勢的作為。 4、全程作戰構想之儘早確立及謀略 5、欺敵之配合。", "source": "陸軍作戰要綱(115年)，第三篇第四章第304004條P 3-4-104"}, {"id": 29, "cat": "陸綱", "no": 29, "q": "逐次抵抗意義與目的為何?", "a": "逐次抵抗係沿敵軍進攻路線，利用充分之縱深地區、地形， 構成數帶陣地或據點，交互實施抵抗與轉進之作戰。其目的主在避免決戰，儘量保存戰力，以空間換取時間，消耗與遲滯敵軍，並藉連續不斷有限目標攻擊、伏擊與襲擊，予敵最大損害。", "source": "陸軍作戰要綱(115年)，第三篇第四章第304028條P 3-4-112"}, {"id": 30, "cat": "陸綱", "no": 30, "q": "逐次抵抗方式區分為何?", "a": "逐次抵抗方式區分數帶陣地逐次抵抗、大縱深多據點逐次抵抗等兩種。數帶陣地逐次抵抗又區分連續陣地、交替陣地逐次抵抗兩種。", "source": "陸軍作戰要綱(115年)，第三篇第四章第304028條P 3-4-112"}, {"id": 31, "cat": "陸綱", "no": 31, "q": "防衛作戰特性為何?", "a": "1、獨立性 2、被動性 3、總體性 4、後發性 5、遲滯性 6、不對稱性", "source": "陸軍作戰要綱(115年)，第四篇第一章第401003條P 4-1-126"}, {"id": 32, "cat": "陸綱", "no": 32, "q": "地面防衛作戰成功條件為何?", "a": "1、周密整備。 2、全民防衛。 3、戰力防護。 4、灘岸及要域火殲。 5、連續作戰。", "source": "陸軍作戰要綱(115年)，第四篇第一章第401008條P 4-1-128"}, {"id": 33, "cat": "陸綱", "no": 33, "q": "聯合國土防衛作戰基本概念為何?", "a": "1、獨立守備。 2、分區削弱。 3、灘岸及要域火殲。 4、縱深防禦。", "source": "陸軍作戰要綱(115年)，第四篇第六章第402002條P 4-2-130"}, {"id": 34, "cat": "陸綱", "no": 34, "q": "地面防衛作戰核心概念為何?", "a": "持久作戰。", "source": "陸軍作戰要綱(115年)，第四篇第六章第402002條P 4-2-130"}, {"id": 35, "cat": "陸綱", "no": 35, "q": "戰備整備之目的?", "a": "目的在堅實戰備，奠定防衛作戰成功之基礎，並能肆應不預期之狀況。", "source": "陸軍作戰要綱(115年)，第四篇第三章第403001條P 4-3-138"}, {"id": 36, "cat": "陸綱", "no": 36, "q": "防衛作戰計畫區分為何?", "a": "戰備整備計畫、應變制變計畫、動員計畫、應急（聯合）作戰計畫及全面（聯合）作戰計畫。", "source": "陸軍作戰要綱(115年)，第四篇第三章第403004條P 4-3-139"}, {"id": 37, "cat": "陸綱", "no": 37, "q": "作戰計畫之策訂考慮因素為何?", "a": "作戰計畫之策定係依據上一級任務及構想（指導）所策定， 應考慮任務、敵情、地形與天氣、我軍狀況及民情等因素。", "source": "陸軍作戰要綱(115年)，第四篇第三章第403006條P 4-3-140"}, {"id": 38, "cat": "陸綱", "no": 38, "q": "作戰計畫修訂時機為何?", "a": "1、依既定期程修訂。 2、作戰型態、戰術、戰法改變時。 3、軍隊組織編裝調整或武器裝備更新時。 4、敵情、地形、地物產生變化時。 5、計畫經演練發現缺失時。", "source": "陸軍作戰要綱(115年)，第四篇第三章第403009條P 4-3-140"}, {"id": 39, "cat": "陸綱", "no": 39, "q": "動員編實一般指導為何?", "a": "1、擬訂動員計畫，增強整體與持續戰力。 2、建立軍（民）專業技術人員名冊，因應未來作戰需求。 3、力求動員地與任務一致。 4、主動聯繫、確實核對，落實「編、管、訓、用」合一。 5、力求動員結合編制專長，以適材適用。", "source": "陸軍作戰要綱(115年)，第四篇第一章第403020條P 4-3-143"}, {"id": 40, "cat": "陸綱", "no": 40, "q": "留置作戰之目的為何?", "a": "其目的在牽制、分散與遲滯敵軍行動，癱瘓其指揮、交通與後勤體系，削弱士氣與作戰節奏，策應我主力逆襲與規復行動。", "source": "陸軍作戰要綱(115年)，第四篇第五章405019條P 4-5-194"}, {"id": 41, "cat": "指參", "no": 1, "q": "何謂指揮關係?", "a": "指揮官基於權責，對被指揮者所產生之責任關係，謂之指揮關係。", "source": "陸軍指揮參謀組織與作業教範、第一章第01015條、P1-6頁"}, {"id": 42, "cat": "指參", "no": 2, "q": "何謂支援關係?", "a": "支援關係明示支援與被支援部隊（單位）間之關係與責任。", "source": "陸軍指揮參謀組織與作業教範、第一章第01016條、P1-6頁"}, {"id": 43, "cat": "指參", "no": 3, "q": "簡報分類為何?", "a": "1、任務簡報（含反向簡報、確認簡報）。 2、戰場簡報(演習簡報)。 3、業務簡報(含資料簡報)。 4、參謀簡報。", "source": "陸軍指揮參謀組織與作業教範、第四章第04016條、P4-77頁"}, {"id": 44, "cat": "指參", "no": 4, "q": "戰場簡報（演習簡報）內容為何?", "a": "1、單位、級職、姓名。 2、方向、地形及位置介紹。 3、本單位任務及作戰構想。 4、敵、我軍作戰經過概要。 5、當前狀況及決心、處置。 6、建議事項。", "source": "陸軍指揮參謀組織與作業教範、第四章第 04018條、P4-79頁"}, {"id": 45, "cat": "指參", "no": 5, "q": "狀況判斷之意義與目的?", "a": "狀況判斷為合理之思維程序，乃針對當前狀況及可能發展，綜合考量各有關因素，作有系統之分析，其目的在選定最佳之行動方案", "source": "陸軍指揮參謀組織與作業教範、第五章第 05001條、P5-119頁"}, {"id": 46, "cat": "指參", "no": 6, "q": "持續判斷須包含事項為何？", "a": "1、事實。 2、假定事項。 3、我（友）軍狀況。 4、敵軍活動與能力。 5、民事考量事項。 6、結論與建議。", "source": "陸軍指揮參謀組織與作業教範、第五章第05007條、P5-120頁"}, {"id": 47, "cat": "指參", "no": 7, "q": "敵可能行動列舉時應包括哪些？", "a": "1、何時(開始行動時間)。 2、何地(採取行動之地區)。 3、何事(作戰或戰鬥方式與重點指向)。 4、如何(採取行動之兵力大小)。", "source": "陸軍指揮參謀組織與作業教範、第五章第05015條、P5-146頁"}, {"id": 48, "cat": "指參", "no": 8, "q": "各別命令、任務式命令為何？", "a": "1、各別命令，乃單獨指示下級執行某一行動之命令。 2、任務式命令，乃將所應完成之任務，單獨下達於受命者。", "source": "陸軍指揮參謀組織與作業教範、第六章第05051條、P5-246頁"}, {"id": 49, "cat": "指參", "no": 9, "q": "指參作業程序之階段劃分？", "a": "區分為「計畫作為」、「準備」與「執行」等三個階段。", "source": "陸軍指揮參謀組織與作業教範、第六章第06003條、P6-249頁"}, {"id": 50, "cat": "指參", "no": 10, "q": "指揮程序之內容?", "a": "1、任務分析及初步作戰概念。 2、參謀作業指導。 3、狀況判斷。 4、決心及作戰構想。 5、計畫與命令。 6、督導實施。", "source": "陸軍指揮參謀組織與作業教範、第六章第06009條、P6-255頁"}, {"id": 51, "cat": "指參", "no": 11, "q": "軍事決策程序之步驟為何？", "a": "1、受領任務。 2、任務分析。 3、研擬行動方案。 4、分析行動方案。 5、比較行動方案。 6、核准行動方案。 7、頒布計畫(命令)。", "source": "陸軍指揮參謀組織與作業教範、第六章第06023條、P6-265頁"}, {"id": 52, "cat": "指參", "no": 12, "q": "軍事決策程序之重要作為之機制？", "a": "1、召開作戰會議（簡報）。 2、指揮官對參謀實施作業指導。 3、下達預備命令。", "source": "陸軍指揮參謀組織與作業教範、第六章第06029條、P6-270頁"}, {"id": 53, "cat": "指參", "no": 13, "q": "預備命令(第一次)之內容應包括哪些事項?", "a": "1、當前狀況與任務。 2、作戰方式及作戰地區範圍。 3、初步時間管制。 4、部隊先期運動及偵搜指導。 5、重要作戰準備事項與要求標準。 6、其他重要準備事項。", "source": "陸軍指揮參謀組織與作業教範、第六章第06031條、P6-271頁"}, {"id": 54, "cat": "指參", "no": 14, "q": "指揮官初步參謀作業指導之內容為何?", "a": "1、任務說明。 2、初步指揮官作戰企圖與作戰概念宣達。 3、上級指揮官企圖之特別指示。 4、完成任務所應先期準備事項。 5、各參狀況判斷指導（含戰場情報準備作業）。 6、律定召開作戰會議之時間、地點。 7、其他事項。", "source": "陸軍指揮參謀組織與作業教範、第六章第 06032條、P6-272頁"}, {"id": 55, "cat": "指參", "no": 15, "q": "受領任務後之作業步驟？", "a": "1、將狀況與任務，通知各參謀與作業人員。 2、參謀持續資料蒐整。 3、參謀完成資訊更新。 4、指揮官行初步參謀作業指導。 5、研擬預備命令。", "source": "陸軍指揮參謀組織與作業教範、第六章第06034條、P6-274頁"}, {"id": 56, "cat": "指參", "no": 16, "q": "任務分析之意義為何?", "a": "「任務分析」乃指揮官藉參謀之協助，對上級賦予之任務，實施深入理解之過程。", "source": "陸軍指揮參謀組織與作業教範、第六章第06042條、P6-283頁"}, {"id": 57, "cat": "指參", "no": 17, "q": "任務分析後產生之作業成果主要包含哪些？", "a": "1、戰場情報準備作業成果。 2、各部隊之作戰能力與限制因素。 3、風險評估事項。 4、核定本部任務。 5、指揮官初步作戰企圖與參謀作業指導。 6、預備命令。 7、行動方案評估要項。", "source": "陸軍指揮參謀組織與作業教範、第六章第06043條、P6-283頁"}, {"id": 58, "cat": "指參", "no": 18, "q": "任務分析後之戰場情報準備作業成果為何?", "a": "1、修正後混合障礙透明圖（地形對敵我作戰行動影響分析表）。 2、天候對敵我作戰行動影響分析表。 3、敵可能行動圖解及戰術運用分析表 4、徵候圖解及徵候分析表。 5、情報判斷結論部分。", "source": "陸軍指揮參謀組織與作業教範、第六章第06043條、P6-283頁"}, {"id": 59, "cat": "指參", "no": 19, "q": "何謂特定行動？", "a": "由上級賦予、指派交由本單位執行之任務者，皆為「特定行動」。", "source": "陸軍指揮參謀組織與作業教範、第六章第06048條、P6-288頁"}, {"id": 60, "cat": "指參", "no": 20, "q": "何謂關鍵行動？", "a": "綜合分析特定行動與推斷行動之必然性、重要性、時序性與限制因素等後，即可歸納得出攸關本次作戰成敗之「關鍵行動」。", "source": "陸軍指揮參謀組織與作業教範、第六章第06048條、P6-289頁"}, {"id": 61, "cat": "指參", "no": 21, "q": "風險種類區分？", "a": "1、戰術風險。 2、意外風險。", "source": "陸軍指揮參謀組織與作業教範、第六章第06052條、P6-295頁"}, {"id": 62, "cat": "指參", "no": 22, "q": "指揮官重要情報需求中有關我軍及鄰接友軍狀況資訊稱為?", "a": "友(我)軍情報事項（FFIR） 。", "source": "陸軍指揮參謀組織與作業教範、第六章第06053條、P6-297頁"}, {"id": 63, "cat": "指參", "no": 23, "q": "保密事項、優先情報需求及友（我）軍情報事項通常敘述於計畫（命令）之何處？", "a": "作戰計畫（命令）第三段「執行」之「協調指示事項」 內。", "source": "陸軍指揮參謀組織與作業教範、第六章第06053條、P6-298頁"}, {"id": 64, "cat": "指參", "no": 24, "q": "實施任務分析簡報後指揮官需完成哪些事項，以利後續作業？", "a": "1、核准「本部任務」。 2、宣示其初步「指揮官作戰企圖」與研擬行動方案評估要項之指導。 3、宣達後續之「參謀作業指導」。", "source": "陸軍指揮參謀組織與作業教範、第六章第06057條、P6-301頁"}, {"id": 65, "cat": "指參", "no": 25, "q": "指揮官擬定作戰企圖內心思維為何?", "a": "1、上級指揮官作戰企圖。 2、本部行動與全般作戰關係。 3、為圓滿達成任務所應獲取之戰果。 4、多重目標與多重任務之主從。 5、為達成任務之必要手段。", "source": "陸軍指揮參謀組織與作業教範、第六章第06059條、P6-305頁"}, {"id": 66, "cat": "指參", "no": 26, "q": "行動方案應具備之特性為何？", "a": "1、一致性。 2、可行性。 3、可接受性。 4、獨特性。  5、完整性。", "source": "陸軍指揮參謀組織與作業教範、第六章第06065條、P6-318頁"}, {"id": 67, "cat": "指參", "no": 27, "q": "研擬行動方案之步驟為何？", "a": "1、分析敵、我相對戰力。   2、研擬各種行動方案選項。 3、初步規劃各行動方案所需兵力及部署。 4、研擬各行動方案作戰構想。 5、律定各行動方案任務編組。 6、完成各行動方案文字敘述及圖解。", "source": "陸軍指揮參謀組織與作業教範、第六章第06066條、P6-319頁"}, {"id": 68, "cat": "指參", "no": 28, "q": "分析行動方案之意義為何？", "a": "藉由「分析行動方案」可檢視出我軍至當行動與最佳兵力 編組，方能以最低損耗，獲致最大戰果，達成任務，並對爾後戰局開創有利態勢。", "source": "陸軍指揮參謀組織與作業教範、第六章第06078條、P6-339頁"}, {"id": 69, "cat": "指參", "no": 29, "q": "決心點為何？", "a": "係指在作戰任務執行中，需要下達處置作為有關之「重 大事件」與兵、火力調整或危機及契機其所在「地點」，亦係指揮官或參謀預期必須下達決心之時、空 （時機）點。", "source": "陸軍指揮參謀組織與作業教範、第六章第06086條、P6-345頁"}, {"id": 70, "cat": "指參", "no": 30, "q": "分析行動方案推演中，參謀必須針對每項敵可能行動列舉何事項?", "a": "1、重大事件 2、決心點", "source": "陸軍指揮參謀組織與作業教範、第六章第06086條、P6-346頁"}, {"id": 71, "cat": "指參", "no": 31, "q": "決心點可依據何預判?", "a": "可依據作戰「經驗」與「效程」先行預判，然後再於推演時驗證，以判定下達決心之時間與地點。", "source": "陸軍指揮參謀組織與作業教範、第六章第06086條、P6-346頁"}, {"id": 72, "cat": "指參", "no": 32, "q": "評估要項為何？", "a": "係指在推演過程中，用以衡量行動方案作戰效能之項目，而該等要項將可能影響敵、我雙方作戰成敗之關鍵。", "source": "陸軍指揮參謀組織與作業教範、第六章第06087條、P6-346頁"}, {"id": 73, "cat": "指參", "no": 33, "q": "分析行動方案推演模式為何?", "a": "1、帶狀法。 2、區塊法。 3、條狀法。", "source": "陸軍指揮參謀組織與作業教範、第六章第06088條、P6-347頁"}, {"id": 74, "cat": "指參", "no": 34, "q": "分析行動方案推演之過程運作為何?", "a": "乃遵循「行動」－「反應」－「反制」之循環而運作。", "source": "陸軍指揮參謀組織與作業教範、第六章第06091條、P6-356頁"}, {"id": 75, "cat": "指參", "no": 35, "q": "分析行動方案推演成果為何?", "a": "1、決心支援圖解 2、協同計畫管制表 3、決心支援表", "source": "陸軍指揮參謀組織與作業教範、第六章第06092條、P6-361頁"}, {"id": 76, "cat": "指參", "no": 36, "q": "決心簡報時使用何向指揮官實施簡報?", "a": "1、決心支援圖解（含決心支援表） 2、協同計畫管制表 3、行動方案比較表", "source": "陸軍指揮參謀組織與作業教範、第六章第06105條、P6-374頁"}, {"id": 77, "cat": "指參", "no": 37, "q": "預演的形式概分為何?", "a": "1、全裝預演。 2、減裝預演。 3、沙盤推演。 4、圖上推演。 5、無線電預演。 6、電腦兵棋推演。", "source": "陸軍指揮參謀組織與作業教範、第六章第06137條、P6-397頁"}, {"id": 78, "cat": "指參", "no": 38, "q": "督導實施之目的為何？", "a": "準備階段督導之目的在確保下級貫徹指揮官意志，促進所屬相互合作，並瞭解其工作進度，同時就所見單位現況與問題，適時建議指揮官調整必要之資源，並在執行階段前隨時掌握狀況變化。", "source": "陸軍指揮參謀組織與作業教範、第六章第06150條、P6-402頁"}, {"id": 79, "cat": "指參", "no": 39, "q": "快速決策與同步程序（RDSP）作業步驟為何？", "a": "1、瞭解當前狀況與預期之差異。  2、決定採取何種決心類型與行動。  3、修訂行動方案。  4、確認行動方案與下達作戰指導。  5、頒布作戰命令。", "source": "陸軍指揮參謀組織與作業教範、第六章第06164條、P6-409頁"}, {"id": 80, "cat": "指參", "no": 40, "q": "時間受限下指參作業程序節省時間之具體作為？", "a": "1、以既有計畫為基礎。 2、增加指揮官親自參與程度。 3、指揮官下達更明確之參謀作業指導。 4、指揮官限制行動方案數量與兵棋推演次數。 5、強化同步計畫作為。 6、善用參謀作業指導。", "source": "陸軍指揮參謀組織與作業教範、第六章第06176條、P6-421頁"}, {"id": 81, "cat": "情報", "no": 1, "q": "戰場情報準備作業程序為何？", "a": "1、界定戰場空間。 2、分析作戰地區。 3、評估敵軍威脅。 4、研判敵可能行動。", "source": "陸軍戰場情報準備作業教範、01012條、P1-8頁"}, {"id": 82, "cat": "情報", "no": 2, "q": "何謂「作戰地區」？", "a": "作戰地區乃是使部隊在一個被指定範圍內，遂行上級所分 配之作戰行動；作戰地區幅員大小，須在上級指定區域範圍內，部隊指揮官依據所賦予之權責，指揮所屬部隊（含配屬及作戰管制），統一運用整合戰力，對抗敵軍，爭取勝利，達成任務。", "source": "陸軍戰場情報準備作業教範、02009條、P2-36頁"}, {"id": 83, "cat": "情報", "no": 3, "q": "何謂「利害地區」？", "a": "利害地區乃基於敵情偵蒐與情報預警，其範圍包括作戰地 區與其鄰接地區，並延伸至敵我兵（火）力可涵蓋之區域。", "source": "陸軍戰場情報準備作業教範、02011條、P2-40頁"}, {"id": 84, "cat": "情報", "no": 4, "q": "地形分析中，地形五大要素為何?", "a": "障礙、接近路線、觀測與射界、隱蔽與掩蔽、地形要點。", "source": "陸軍戰場情報準備作業教範、03010條、P3-60頁"}, {"id": 85, "cat": "情報", "no": 5, "q": "何謂障礙？", "a": "障礙乃指地面任何天然或人為之地形、地物，足以妨礙觀測、射擊、部隊運動者均屬之。", "source": "陸軍戰場情報準備作業教範、03012條、P3-61頁"}, {"id": 86, "cat": "情報", "no": 6, "q": "何謂地形要點？", "a": "地形要點即任一地點或地區其攻占或固守，對敵我雙方任一方，具有顯著利益者。地形要點對於任務的完成具有決定性的影響則稱之為關鍵地形。", "source": "陸軍戰場情報準備作業教範、03021條、P3-72頁"}, {"id": 87, "cat": "情報", "no": 7, "q": "何謂接近路線？", "a": "供某一適當大小與類型之部隊，以通達地形要點或目標之適切而便利的運動空間，稱為接近路線。", "source": "陸軍戰場情報準備作業教範、03014條、P3-66頁"}, {"id": 88, "cat": "情報", "no": 8, "q": "依何步驟分析接近路線？", "a": "1、組合各機動走廊為接近路線。 2、標繪接近路線。 3、評估接近路線。 4、賦予各接近路線編號。", "source": "陸軍戰場情報準備作業教範、03014條、P3-66頁"}, {"id": 89, "cat": "情報", "no": 9, "q": "何謂高價值目標？", "a": "高價值目標係指敵軍指揮官為達成任務所需之主要作戰部隊（單位）。", "source": "陸軍戰場情報準備作業教範、04016條、P4-102頁"}, {"id": 90, "cat": "情報", "no": 10, "q": "何謂高效益目標？", "a": "係我軍達成任務，應摧毀之主要戰力，敵軍失去此一目標後，可有利我軍任務之達成。", "source": "陸軍戰場情報準備作業教範、04018條、P4-104頁"}, {"id": 91, "cat": "聯兵營", "no": 1, "q": "聯合兵種營攻擊正面為何", "a": "營之攻擊正面主依第一線展開之連級部隊數量、偵蒐距離及支援火力所涵蓋的範圍來決定，通常概約為２,０００～６,０００公尺。", "source": "聯合兵種營作戰教範第三章第03017條P3-227"}, {"id": 92, "cat": "聯兵營", "no": 2, "q": "聯合兵種營防禦正面及縱深為何?", "a": "營防禦正面通常為２,０００～４,０００公尺，縱深為２,０００～３,０００公尺。", "source": "聯合兵種營作戰教範第三章第03116條P3-303"}, {"id": 93, "cat": "聯兵營", "no": 3, "q": "攻擊中 足以左右戰局之手段為何?", "a": "1、適時有效集中火力。 2、即時投入預備隊。 3、親臨第一線領導攻擊。", "source": "聯合兵種營作戰教範第三章第03030條P3-237~238"}, {"id": 94, "cat": "聯兵營", "no": 4, "q": "突穿攻擊區分那些階段?", "a": "1、造成突破口。 2、擴大突破口。 3、奪取最後目標。", "source": "聯合兵種營作戰教範第三章第03037條P3-240"}, {"id": 95, "cat": "聯兵營", "no": 5, "q": "包圍攻擊區分那些階段?", "a": "1、完成包圍圈。 2、壓縮包圍圈。 3、分割擊滅。", "source": "聯合兵種營作戰教範第三章第03042條P3-244~245"}, {"id": 96, "cat": "聯兵營", "no": 6, "q": "追擊階段區分為何?", "a": "1、戰場追擊。 2、縱隊追擊。", "source": "聯合兵種營作戰教範第三章第03053條P3-252"}, {"id": 97, "cat": "聯兵營", "no": 7, "q": "防禦意義與目的為何?", "a": "防禦係藉兵、火力與地形等之利用，拒止、消耗及摧破敵之攻擊，確保防禦地區、爭取時間或待增援部隊到達，以利全般與爾後之作戰。", "source": "聯合兵種營作戰教範第三章第03079條P3-272~273"}, {"id": 98, "cat": "聯兵營", "no": 8, "q": "防禦一般要領為何?", "a": "1、善用地形。 2、爭取主動。 3、形成重點。 4、縱深配置。 5、火力殲敵。", "source": "聯合兵種營作戰教範第三章第03083條P3-274~275"}, {"id": 99, "cat": "聯兵營", "no": 9, "q": "攻擊時重點指向為何", "a": "1、敵未預期之正面。 2、便於我戰力發揮，而不利於敵戰力發揮之處。 3、敵之側翼、配備間隙、部隊接合部。 4、敵素質低劣部隊。", "source": "聯合兵種營作戰教範第三章第03015條P3-226"}, {"id": 100, "cat": "聯兵營", "no": 10, "q": "陣地防禦意義與目的為何?", "a": "陣地防禦係以主力部署於主陣地帶，依火力及逆襲，殲滅敵於陣地前或陣地內，以確保防禦地區完整之防禦方式。", "source": "聯合兵種營作戰教範第三章第03110條P3-296"}];
let STATE={page:'home', session:[], index:0, current:null, exam:null, graded:false};
const KEY='quizapp_v4_single_stats';
function loadStats(){try{return JSON.parse(localStorage.getItem(KEY))||{total:0,scoreSum:0,wrong:[],fav:[],records:[],days:{}}}catch(e){return {total:0,scoreSum:0,wrong:[],fav:[],records:[],days:{}}}}
function saveStats(s){localStorage.setItem(KEY,JSON.stringify(s)); updateDashboard();}
function normalize(s){return (s||'').replace(/[\s

	，。、《》「」『』：；！？!?,.;:、（）()\[\]【】－—…~～·・"'“”‘’]/g,'').replace(/[０-９]/g,d=>String('０１２３４５６７８９'.indexOf(d))).replace(/[Ａ-Ｚａ-ｚ]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xFEE0));}
function diffChars(ans, ref){let a=[...normalize(ans)], b=[...normalize(ref)]; const n=a.length,m=b.length; let dp=Array.from({length:n+1},()=>Array(m+1).fill(0)); for(let i=0;i<=n;i++)dp[i][0]=i; for(let j=0;j<=m;j++)dp[0][j]=j; for(let i=1;i<=n;i++)for(let j=1;j<=m;j++){let cost=a[i-1]===b[j-1]?0:1; dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+cost)} let ops=[],i=n,j=m; while(i>0||j>0){if(i>0&&j>0&&dp[i][j]===dp[i-1][j-1]+(a[i-1]===b[j-1]?0:1)){ops.push({t:a[i-1]===b[j-1]?'ok':'wrong',u:a[i-1],r:b[j-1]});i--;j--;}else if(j>0&&dp[i][j]===dp[i][j-1]+1){ops.push({t:'miss',r:b[j-1]});j--;}else{ops.push({t:'extra',u:a[i-1]});i--;}} ops.reverse(); return ops;}
function esc(s){return String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function grade(ans, ref){const ops=diffChars(ans,ref); let wrong=0,miss=0,extra=0; let html=''; for(const o of ops){if(o.t==='ok')html+=`<span class="ok">${esc(o.u)}</span>`; if(o.t==='wrong'){wrong++;html+=`<span class="wrong">${esc(o.u)}→${esc(o.r)}</span>`} if(o.t==='miss'){miss++;html+=`<span class="miss">缺${esc(o.r)}</span>`} if(o.t==='extra'){extra++;html+=`<span class="extra">多${esc(o.u)}</span>`}} const deduction=(wrong+miss+extra)*0.5; return {score:Math.max(0,100-deduction),wrong,miss,extra,html,totalErr:wrong+miss+extra};}
function showPage(p){document.querySelectorAll('.page').forEach(x=>x.classList.add('hidden')); document.getElementById(p).classList.remove('hidden'); document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active')); let tb=document.getElementById('tab-'+p); if(tb)tb.classList.add('active'); if(p==='wrong')renderWrong(); if(p==='stats')renderStats(); updateDashboard();}
function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5)}
function byRange(cat,a,b){return QUESTIONS.filter(q=>q.cat===cat&&q.no>=a&&q.no<=b)}
function makeSession(mode){if(mode==='army1')return byRange('陸綱',1,20); if(mode==='army2')return byRange('陸綱',21,40); if(mode==='staff1')return byRange('指參',1,20); if(mode==='staff2')return byRange('指參',21,40); if(mode==='intel')return byRange('情報',1,10); if(mode==='cab')return byRange('聯兵營',1,10); if(mode==='mix20')return shuffle([...byRange('陸綱',1,20),...byRange('指參',1,20),...byRange('情報',1,10),...byRange('聯兵營',1,10)]).slice(0,20); if(mode==='mix40')return shuffle(QUESTIONS).slice(0,40); return QUESTIONS;}
function startPractice(){STATE.exam=null; STATE.session=makeSession(document.getElementById('practiceMode').value); STATE.index=0; document.getElementById('quizCard').classList.remove('hidden'); loadQuestion();}
function startExam(stage){let count=stage===1?20:100; STATE.exam={stage,pass:stage===1?95:stage===2?97:99, scores:[], start:Date.now()}; STATE.session=shuffle(QUESTIONS).slice(0,count); STATE.index=0; showPage('practice'); document.getElementById('quizCard').classList.remove('hidden'); loadQuestion();}
function loadQuestion(){STATE.current=STATE.session[STATE.index]; STATE.graded=false; if(!STATE.current){finishSession();return;} document.getElementById('qBadge').textContent=`${STATE.current.cat} 第${STATE.current.no}題`; document.getElementById('qProgress').textContent=`${STATE.index+1}/${STATE.session.length}`; document.getElementById('qText').textContent=STATE.current.q; document.getElementById('answerInput').value=''; ['scoreLine','diffResult','refAnswer'].forEach(id=>document.getElementById(id).classList.add('hidden'));}
function gradeCurrent(){if(!STATE.current)return; const res=grade(document.getElementById('answerInput').value,STATE.current.a); document.getElementById('scoreLine').classList.remove('hidden'); document.getElementById('diffResult').classList.remove('hidden'); document.getElementById('scoreLine').innerHTML=`<b>本題得分：${res.score.toFixed(1)} / 100</b><br>錯字：${res.wrong}　漏字：${res.miss}　多字：${res.extra}　扣分：${((res.wrong+res.miss+res.extra)*0.5).toFixed(1)}`; document.getElementById('diffResult').innerHTML=res.html||'<span class="ok">完全正確</span>'; if(STATE.graded)return; STATE.graded=true; let s=loadStats(); s.total++; s.scoreSum+=res.score; const d=new Date().toISOString().slice(0,10); s.days[d]=(s.days[d]||0)+1; if(res.score<100 && !s.wrong.some(x=>x.id===STATE.current.id))s.wrong.push(STATE.current); if(STATE.exam) STATE.exam.scores.push({q:STATE.current,score:res.score,err:res.totalErr}); saveStats(s);}
function showReference(){document.getElementById('refAnswer').classList.remove('hidden'); document.getElementById('refAnswer').innerHTML='<b>標準答案：</b><br>'+esc(STATE.current.a)+'<br><br><span class="muted">出處：'+esc(STATE.current.source)+'</span>';}
function nextQuestion(){if(!STATE.graded && document.getElementById('answerInput').value.trim()) gradeCurrent(); STATE.index++; loadQuestion();}
function finishSession(){document.getElementById('quizCard').classList.add('hidden'); if(STATE.exam){const scores=STATE.exam.scores; const avg=scores.length? scores.reduce((a,b)=>a+b.score,0)/scores.length:0; const pass=avg>=STATE.exam.pass; const mins=Math.round((Date.now()-STATE.exam.start)/60000); const rep=`測驗完成

階段：第${STATE.exam.stage}階段
題數：${STATE.session.length}
總分：${avg.toFixed(1)} / 100
合格標準：${STATE.exam.pass}
結果：${pass?'✅ 合格':'❌ 不合格'}
花費時間：約${mins}分鐘
錯題數：${scores.filter(x=>x.score<100).length}`; document.getElementById('examReport').classList.remove('hidden'); document.getElementById('examReport').innerHTML='<h2>成績單</h2><div class="report">'+esc(rep)+'</div>'; showPage('exam'); let s=loadStats(); s.records.push({date:new Date().toLocaleString(), stage:STATE.exam.stage, score:avg, pass}); saveStats(s); } else alert('本次練習完成');}
function favCurrent(){let s=loadStats(); if(STATE.current&&!s.fav.some(x=>x.id===STATE.current.id)){s.fav.push(STATE.current);saveStats(s);alert('已收藏')}}
function renderWrong(){let s=loadStats(); let box=document.getElementById('wrongList'); if(!s.wrong.length){box.innerHTML='<p class="muted">目前沒有錯題。</p>';return} box.innerHTML=s.wrong.map(q=>`<div class="listitem"><b>${q.cat} 第${q.no}題</b><br>${esc(q.q)}<br><button class="secondary" onclick="removeWrong(${q.id})">移除</button></div>`).join('');}
function removeWrong(id){let s=loadStats(); s.wrong=s.wrong.filter(x=>x.id!==id); saveStats(s); renderWrong();}
function clearWrong(){if(confirm('確定清空錯題庫？')){let s=loadStats(); s.wrong=[]; saveStats(s); renderWrong();}}
function practiceWrong(){let s=loadStats(); if(!s.wrong.length){alert('沒有錯題');return} STATE.exam=null; STATE.session=shuffle(s.wrong); STATE.index=0; showPage('practice'); document.getElementById('quizCard').classList.remove('hidden'); loadQuestion();}
function updateDashboard(){let s=loadStats(); document.getElementById('sTotal').textContent=s.total||0; document.getElementById('sAvg').textContent=s.total?(s.scoreSum/s.total).toFixed(1):'0'; document.getElementById('sWrong').textContent=s.wrong?.length||0; const days=Object.keys(s.days||{}).sort(); document.getElementById('sStreak').textContent=calcStreak(days);}
function calcStreak(days){let set=new Set(days), c=0, d=new Date(); for(;;){let k=d.toISOString().slice(0,10); if(set.has(k)){c++;d.setDate(d.getDate()-1)}else break} return c;}
function renderStats(){let s=loadStats(); const avg=s.total?(s.scoreSum/s.total).toFixed(1):0; let cats=['陸綱','指參','情報','聯兵營']; document.getElementById('statsBox').innerHTML=`<div class="stats"><div class="stat"><b>${s.total||0}</b><span>累積作答</span></div><div class="stat"><b>${avg}</b><span>平均分</span></div><div class="stat"><b>${s.wrong.length}</b><span>錯題</span></div><div class="stat"><b>${(s.records||[]).length}</b><span>測驗紀錄</span></div></div><h3>最近成績</h3>`+(s.records||[]).slice(-5).reverse().map(r=>`<div class="listitem">${esc(r.date)}｜第${r.stage}階段｜${r.score.toFixed(1)}｜${r.pass?'合格':'不合格'}</div>`).join('');}
if('serviceWorker' in navigator){/* 單檔版不註冊，避免舊快取造成題庫失敗 */}
showPage('home'); updateDashboard();
</script></body></html>
