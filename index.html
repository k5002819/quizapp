<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#123524">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="協同準則">
  <title>協同準則學習系統 V3.0</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div><div class="badge">🎖 協同準則學習系統</div><h1>V3.0 智慧批改版</h1></div>
    <button id="themeBtn" class="ghost">🌙</button>
  </header>
  <main>
    <section id="home" class="panel active">
      <div class="hero">
        <h2>100題題庫｜逐字批改｜GitHub Pages / iPhone PWA</h2>
        <p>每題100分，每錯、漏、多一字扣0.5分；忽略標點符號。</p>
      </div>
      <div class="grid stats" id="statsCards"></div>
      <div class="grid menu">
        <button onclick="showPanel('practice')">📚 一般練習</button>
        <button onclick="showPanel('exam')">📝 三階段模擬考</button>
        <button onclick="startWrongPractice()">📌 錯題庫</button>
        <button onclick="showPanel('progress')">📊 學習統計</button>
        <button onclick="showPanel('game')">🧩 方塊挑戰</button>
        <button onclick="showPanel('search')">🔎 搜尋題目</button>
      </div>
    </section>

    <section id="practice" class="panel">
      <button class="back" onclick="showPanel('home')">← 返回</button><h2>一般練習</h2>
      <h3>模式一：各別依序練習</h3>
      <div class="grid menu small">
        <button onclick="startSequential('army',1,20)">陸綱 1-20</button>
        <button onclick="startSequential('army',21,40)">陸綱 21-40</button>
        <button onclick="startSequential('staff',1,20)">指參 1-20</button>
        <button onclick="startSequential('staff',21,40)">指參 21-40</button>
        <button onclick="startSequential('intel',1,10)">情報 1-10</button>
        <button onclick="startSequential('combined',1,10)">聯兵營 1-10</button>
      </div>
      <h3>模式二／三</h3>
      <div class="grid menu small">
        <button onclick="startMixed20()">隨機20題：各科前段混合</button>
        <button onclick="startRandom40()">隨機40題：全題庫</button>
      </div>
    </section>

    <section id="exam" class="panel">
      <button class="back" onclick="showPanel('home')">← 返回</button><h2>三階段模擬考</h2>
      <div class="grid menu">
        <button onclick="startExam(1)">第一階段：20題｜合格95分</button>
        <button onclick="startExam(2)">第二階段：100題｜合格97分</button>
        <button onclick="startExam(3)">第三階段：100題｜合格99分</button>
      </div>
    </section>

    <section id="quiz" class="panel">
      <div class="topbar"><button class="back" onclick="finishOrHome()">← 結束/返回</button><span id="modeLabel"></span></div>
      <div class="progressbar"><div id="bar"></div></div>
      <div class="question-card">
        <div id="qMeta" class="meta"></div><h2 id="qText"></h2>
        <textarea id="answerInput" placeholder="請輸入答案；可按提交批改。"></textarea>
        <div class="actions">
          <button onclick="gradeCurrent()">✅ 提交批改</button>
          <button class="secondary" onclick="showStdAnswer()">👁 顯示標準答案</button>
          <button class="secondary" onclick="nextQuestion()">下一題 →</button>
          <button class="secondary" onclick="toggleStar()" id="starBtn">☆ 收藏</button>
        </div>
      </div>
      <div id="result" class="result hidden"></div>
    </section>

    <section id="progress" class="panel">
      <button class="back" onclick="showPanel('home')">← 返回</button><h2>學習進度統計</h2>
      <div id="progressContent"></div>
    </section>

    <section id="search" class="panel">
      <button class="back" onclick="showPanel('home')">← 返回</button><h2>搜尋題目</h2>
      <input id="searchBox" class="search" placeholder="輸入題目或答案關鍵字" oninput="renderSearch()">
      <div id="searchResult"></div>
    </section>

    <section id="game" class="panel">
      <button class="back" onclick="showPanel('home')">← 返回</button><h2>🧩 方塊消除挑戰</h2>
      <p>初始3個方塊。回答隨機題目取得新方塊；滿分取得3個，未滿分取得1個。可按 🔄 換題。</p>
      <div class="gamebox"><div>方塊：<b id="blocks">3</b></div><div>分數：<b id="gameScore">0</b></div><div>連擊：<b id="combo">0</b></div></div>
      <button onclick="consumeBlock()">放置/消除一個方塊</button>
      <button onclick="newGameQuestion()">🔄 重新整理題目</button>
      <div class="question-card"><div id="gameQMeta" class="meta"></div><h2 id="gameQ"></h2><textarea id="gameAns"></textarea><div class="actions"><button onclick="gradeGame()">回答取得方塊</button></div></div>
      <div id="gameResult" class="result hidden"></div>
    </section>
  </main>
  <footer>資料儲存在本機瀏覽器。更新題庫後請重新整理網頁。</footer>
  <script src="app.js"></script>
</body>
</html>
