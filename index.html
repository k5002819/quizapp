<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>協同準則學習系統 V3.5</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body><header><div class="wrap"><h1>🎖 協同準則學習系統 V3.5</h1><div class="sub">GitHub Pages / iPhone PWA / 逐字批改 / 方塊消除</div></div></header><main class="wrap"><section id="home" class="view"><div class="card"><h2>主選單</h2><div class="grid"><button class="btn" onclick="showView('practiceMenu')">一般練習</button><button class="btn blue" onclick="showView('examMenu')">模擬考</button><button class="btn warn" onclick="startGame()">方塊消除遊戲</button><button class="btn alt" onclick="showWrong()">錯題庫</button><button class="btn alt" onclick="showStats()">學習統計</button></div></div><div class="card"><h2>今日進度</h2><div id="dashStats" class="stats"></div></div></section><section id="practiceMenu" class="view hidden"><nav class="topnav"><button class="btn alt" onclick="showView('home')">回首頁</button></nav><div class="card"><h2>一般練習</h2><div class="grid"><button class="btn" onclick="startSequential('陸綱',1,20)">陸綱 1-20</button><button class="btn" onclick="startSequential('陸綱',21,40)">陸綱 21-40</button><button class="btn" onclick="startSequential('指參',1,20)">指參 1-20</button><button class="btn" onclick="startSequential('指參',21,40)">指參 21-40</button><button class="btn" onclick="startSequential('情報',1,10)">情報 1-10</button><button class="btn" onclick="startSequential('聯兵營',1,10)">聯兵營 1-10</button><button class="btn blue" onclick="startMixed20()">混合 20 題</button><button class="btn blue" onclick="startRandom40()">全範圍 40 題</button></div></div></section><section id="examMenu" class="view hidden"><nav class="topnav"><button class="btn alt" onclick="showView('home')">回首頁</button></nav><div class="card"><h2>模擬考</h2><div class="grid"><button class="btn" onclick="startExam(1,20,95)">第一階段 20題 / 95合格</button><button class="btn" onclick="startExam(2,100,97)">第二階段 100題 / 97合格</button><button class="btn" onclick="startExam(3,100,99)">第三階段 100題 / 99合格</button></div></div></section><section id="quiz" class="view hidden"><nav class="topnav"><button class="btn alt" onclick="showView('home')">回首頁</button><button class="btn alt" onclick="prevQ()">上一題</button><button class="btn alt" onclick="nextQ()">下一題</button></nav><div class="card"><div id="quizMeta" class="sub"></div><div id="question" class="qbox"></div><textarea id="userAnswer" placeholder="請輸入答案，按『提交批改』後會標示錯字、漏字、多字。"></textarea><div><button class="btn" onclick="gradeCurrent()">提交批改</button><button class="btn alt" onclick="revealAnswer()">顯示答案</button><button class="btn warn" onclick="toggleFavorite()">收藏</button></div><div id="gradeResult"></div><div id="answerBox" class="answer hidden"></div></div></section><section id="wrong" class="view hidden"><nav class="topnav"><button class="btn alt" onclick="showView('home')">回首頁</button><button class="btn danger" onclick="clearWrong()">清空錯題</button></nav><div class="card"><h2>錯題庫</h2><div id="wrongList"></div></div></section><section id="stats" class="view hidden"><nav class="topnav"><button class="btn alt" onclick="showView('home')">回首頁</button><button class="btn danger" onclick="resetStats()">重置統計</button></nav><div class="card"><h2>學習統計</h2><div id="statsBox" class="stats"></div></div><div class="card"><h2>最近成績單</h2><div id="reports"></div></div></section><section id="game" class="view hidden"><nav class="topnav"><button class="btn alt" onclick="showView('home')">回首頁</button><button class="btn danger" onclick="startGame()">重新開始</button></nav><div class="card"><h2>🧩 方塊消除</h2><p class="sub">點選下方方塊，再點棋盤放置。填滿整行或整列會消除。方塊用完後需答題取得新方塊。</p><div class="stats"><div class="stat">分數<br><b id="gameScore">0</b></div><div class="stat">消除<br><b id="gameClears">0</b></div><div class="stat">剩餘方塊<br><b id="gameBlocks">3</b></div></div><div id="board" class="board"></div><h3>可用方塊</h3><div id="blocks" class="blocks"></div></div><div id="gameQuiz" class="card hidden"><h2>回答題目取得新方塊</h2><div><button class="btn alt" onclick="refreshGameQuestion()">🔄 重新整理題目</button></div><div id="gameQuestion" class="qbox"></div><textarea id="gameAnswer" placeholder="輸入答案"></textarea><button class="btn" onclick="submitGameAnswer()">提交換方塊</button><div id="gameGrade"></div></div></section></main><script src="app.js"></script></body></html>
