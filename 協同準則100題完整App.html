<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>協同準則100題完整App</title><style>body{font-family:Microsoft JhengHei,sans-serif;max-width:1000px;margin:auto;padding:20px;background:#eef2f7}.card{background:#fff;padding:20px;border-radius:12px}button{padding:10px;margin:4px}textarea{width:100%;height:90px}</style></head><body><h1>🎖協同準則100題完整練習系統</h1><div class='card'><button onclick="mode='practice';nextQ()">隨機練習</button><button onclick="startExam(20)">模擬考20題</button><button onclick="startExam(50)">模擬考50題</button><button onclick="reviewWrong()">錯題複習</button><h2 id='q'></h2><textarea id='txt'></textarea><br><button onclick='showAns()'>顯示答案</button><button onclick='saveWrong()'>加入錯題</button><button onclick='nextQ()'>下一題</button><p id='ans'></p><p id='status'></p></div><script>const data=[{q:'現代戰場用兵，應置重點於何處?',a:'戰場用兵應置重點於打擊敵指管系統、摧毀敵作戰重心。'},{q:'戰爭型態發展為何?',a:'已朝非接觸、非對稱、非線性型態發展。'}];let wrong=JSON.parse(localStorage.getItem('wrongBank')||'[]');let mode='practice',current=null,exam=[],i=0,score=0;function nextQ(){if(mode==='exam'){if(i>=exam.length){status.innerHTML='測驗完成:'+score+'/'+exam.length;return;}current=exam[i++];}else{let pool=(mode==='wrong'&&wrong.length)?wrong:data;current=pool[Math.floor(Math.random()*pool.length)];}q.innerText=current.q;ans.innerHTML='';}function showAns(){ans.innerHTML='<b>參考答案：</b>'+current.a;if(mode==='exam'){if(confirm('答對?'))score++;}}function saveWrong(){if(!wrong.some(x=>x.q===current.q)){wrong.push(current);localStorage.setItem('wrongBank',JSON.stringify(wrong));}alert('已加入錯題');}function reviewWrong(){mode='wrong';nextQ();}function startExam(n){mode='exam';score=0;i=0;exam=[...data].sort(()=>Math.random()-0.5).slice(0,n);nextQ();}nextQ();</script></body></html>
